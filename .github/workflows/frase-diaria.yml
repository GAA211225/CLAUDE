name: Frase del día

on:
  schedule:
    # 12:00 UTC = 6:00 AM hora de México (UTC-6, sin horario de verano)
    - cron: '0 12 * * *'
  workflow_dispatch: {}

jobs:
  frase:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependencias
        working-directory: notifier
        run: npm install
      - name: Enviar frase
        working-directory: notifier
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node frase.js
