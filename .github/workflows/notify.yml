name: Avisos de pedidos

on:
  schedule:
    # 14:00 UTC = 8:00 AM hora de México (UTC-6)
    - cron: '0 14 * * *'
  workflow_dispatch: {}

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Instalar dependencias
        working-directory: notifier
        run: npm install
      - name: Enviar avisos
        working-directory: notifier
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: node index.js
